name: Notícias a cada 1h

# Dispara a vertical jornalística a cada 1 hora. Roda no GitHub Actions (grátis).
# Para confiabilidade extra, recomenda-se um gatilho no cron-job.org apontando
# pro mesmo endpoint (best-effort do GitHub pode atrasar/dropar, mas a hora
# seguinte cobre — notícia horária se auto-cura).
on:
  schedule:
    - cron: '0 0-2,9-23 * * *'   # de hora em hora, ~6h às 23h BRT (pula a madrugada)
  workflow_dispatch: {}   # permite rodar manualmente pelo painel do GitHub

jobs:
  publish-news:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/cron/news
        id: call
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://endinheirados.cc/api/cron/news")
          echo "HTTP $code"
          cat /tmp/out.json
          echo "BODY=$(cat /tmp/out.json)" >> "$GITHUB_ENV"
          test "$code" = "200"

      - name: Avisar no Telegram se falhar
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🚨 FALHA no cron de NOTÍCIAS (2h)
          Resposta: ${BODY}
          Logs: https://github.com/le0nam6/dinheiro-descomplicado/actions/runs/${{ github.run_id }}"
