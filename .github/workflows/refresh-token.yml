name: Renovar token do Instagram (mensal)

# Renova o IG access token todo dia 1 e avisa no Telegram (sucesso ou falha).
# Horário UTC: 12 = 9h BRT.
on:
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch: {}

concurrency:
  group: refresh-ig-token
  cancel-in-progress: false

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/cron/refresh-token
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://endinheirados.cc/api/cron/refresh-token")
          echo "HTTP $code"
          cat /tmp/out.json
          test "$code" = "200"
