name: Alertas de cotação (30 min)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/cron/price-alerts
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://endinheirados.cc/api/cron/price-alerts")
          echo "HTTP $code"; cat /tmp/out.json
          test "$code" = "200"
