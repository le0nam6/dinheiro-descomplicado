name: Candidatas da edição (22h BRT)

# Manda no Telegram, na noite anterior (~22h BRT = 01:00 UTC), o triplo de
# manchetes candidatas com data, pra você escolher quais entram na edição.
# A edição das 6h monta só com as escolhidas (fallback automático se nada for
# selecionado). A rota é idempotente (não duplica a seleção do dia).
on:
  schedule:
    - cron: '0 1 * * *'     # ~22h BRT
    - cron: '30 1 * * *'    # retry ~22h30 BRT
  workflow_dispatch: {}

concurrency:
  group: edition-candidates
  cancel-in-progress: false

jobs:
  send-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/cron/edition-candidates
        id: call
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 120 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://endinheirados.cc/api/cron/edition-candidates")
          echo "HTTP $code"
          cat /tmp/out.json
          echo "BODY=$(cat /tmp/out.json)" >> "$GITHUB_ENV"
          test "$code" = "200"

      - name: Avisar no Telegram se falhar
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🚨 FALHA no cron de CANDIDATAS da edição
          Resposta: ${BODY}
          Logs: https://github.com/le0nam6/dinheiro-descomplicado/actions/runs/${{ github.run_id }}"
