name: Watchdog da edição (7h/8h BRT)

# Rede de segurança final: depois do horário em que a edição deveria ter saído,
# verifica se ela existe. Se não, tenta reprocessar e avisa no Telegram.
# Cobre o caso (raro) de TODOS os gatilhos falharem em silêncio.
on:
  schedule:
    - cron: '0 10 * * *'    # ~07h BRT
    - cron: '0 11 * * *'    # ~08h BRT (segunda checagem)
  workflow_dispatch: {}

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/cron/edition-watchdog
        id: call
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://endinheirados.cc/api/cron/edition-watchdog")
          echo "HTTP $code"
          cat /tmp/out.json
          echo "BODY=$(cat /tmp/out.json)" >> "$GITHUB_ENV"
          test "$code" = "200"

      - name: Avisar no Telegram se o watchdog falhar
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🚨 FALHA no WATCHDOG da edição
          Resposta: ${BODY}
          Logs: https://github.com/le0nam6/dinheiro-descomplicado/actions/runs/${{ github.run_id }}"
